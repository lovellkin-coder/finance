<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제정리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Gmarket+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f0eb;--white:#fff;--surface:#f8f7f4;--border:#e4e0d8;--border2:#cbc6bb;
  --text:#1c1a17;--text2:#5e5a52;--text3:#9e9a90;
  --accent:#2a5225;--accent-l:#e5efe3;--accent2:#3d7a36;
  --red:#b83228;--red-l:#fcecea;
  --yellow:#a67c00;--yellow-l:#fef8e6;
  --radius:10px;--shadow:0 1px 4px rgba(0,0,0,.07),0 4px 18px rgba(0,0,0,.05);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;font-size:15px;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
.lbox{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:52px 48px;width:360px;text-align:center;box-shadow:var(--shadow);}
.lbox .logo{font-family:'Gmarket Sans',sans-serif;font-size:12px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.lbox h1{font-size:24px;font-weight:700;margin-bottom:8px;}
.lbox p{color:var(--text2);font-size:14px;margin-bottom:30px;}
.lbox input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:14px;font-size:20px;letter-spacing:8px;text-align:center;margin-bottom:14px;outline:none;color:var(--text);transition:border-color .2s;}
.lbox input:focus{border-color:var(--accent);}
.lbox button{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.lbox button:hover{opacity:.88;}
.lerr{color:var(--red);font-size:13px;margin-top:8px;display:none;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:54px;}
.nav-brand{font-family:'Gmarket Sans',sans-serif;font-size:16px;font-weight:700;color:var(--accent);}
.nav-tabs{display:flex;gap:3px;}
.ntab{padding:7px 18px;border-radius:7px;font-size:14px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .15s;}
.ntab.active{background:var(--accent-l);color:var(--accent);font-weight:700;}
.ntab:hover:not(.active){background:var(--bg);}
.nav-right{display:flex;gap:8px;}
.bsm{padding:8px 16px;border-radius:7px;font-size:14px;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .15s;}
.bsm:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l);}

/* LAYOUT 50/50 */
.app-layout{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 54px);}
.panel-left{background:var(--white);border-right:1px solid var(--border);overflow-y:auto;position:sticky;top:54px;max-height:calc(100vh - 54px);}
.li{padding:24px 22px;}
.panel-right{padding:28px;overflow-y:auto;max-height:calc(100vh - 54px);}

/* MONTH NAV */
.mnrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.mnbtns{display:flex;align-items:center;gap:10px;}
.mnbtn{width:32px;height:32px;border-radius:7px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.mnbtn:hover{border-color:var(--accent);color:var(--accent);}
.mtitle{font-family:'Gmarket Sans',sans-serif;font-size:20px;font-weight:700;}

/* GOAL */
.goal-inp{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:14px;transition:border-color .2s;}
.goal-inp:focus{border-color:var(--accent);}
.goal-inp::placeholder{color:var(--text3);}

/* INCOME inline */
.inc-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.inc-card{background:var(--accent-l);border:1.5px solid #c2d9be;border-radius:var(--radius);padding:14px;}
.ic-lbl{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:6px;}
.ic-disp{font-size:16px;font-weight:700;color:var(--accent);cursor:pointer;}
.ic-disp:hover{text-decoration:underline;}
.ic-inp{width:100%;background:var(--white);border:1.5px solid var(--accent);border-radius:6px;padding:6px 8px;font-size:15px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;display:none;text-align:right;}

/* HUB BOX */
.hub-box{background:var(--text);color:#fff;border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.hb-lbl{font-size:11px;opacity:.55;margin-bottom:4px;}
.hb-val{font-size:21px;font-weight:700;}
.hb-sub{font-size:11px;opacity:.45;margin-top:3px;}

/* LOAN SECTION */
.loan-section{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.loan-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.loan-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;}
.loan-add-btn{padding:4px 10px;border-radius:6px;font-size:12px;background:var(--accent-l);color:var(--accent);border:1.5px solid #c2d9be;cursor:pointer;font-weight:700;font-family:'Noto Sans KR',sans-serif;}
.loan-rows{display:flex;flex-direction:column;gap:6px;}
.loan-row{display:flex;align-items:center;gap:8px;}
.loan-name-inp{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;padding:7px 9px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;}
.loan-name-inp:focus{border-color:var(--accent);}
.loan-amt-inp{width:130px;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;padding:7px 9px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;text-align:right;}
.loan-amt-inp:focus{border-color:var(--accent);}
.loan-del{width:26px;height:26px;border-radius:5px;border:1.5px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.loan-del:hover{border-color:var(--red);color:var(--red);background:var(--red-l);}
.loan-total{font-size:13px;color:var(--text2);text-align:right;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}

/* SEC TITLE */
.sec-t{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-t::after{content:'';flex:1;height:1px;background:var(--border);}

/* RATIO */
.ratio-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.ratio-track{flex:1;height:9px;background:var(--border);border-radius:99px;overflow:hidden;}
.ratio-fill{height:100%;border-radius:99px;transition:width .4s,background .4s;}
.ratio-pct{font-size:14px;font-weight:700;width:40px;text-align:right;}

/* CAT BARS */
.cat-bars{display:flex;flex-direction:column;gap:8px;}
.cbr{display:flex;align-items:center;gap:8px;}
.cbr-label{font-size:12px;color:var(--text2);width:76px;flex-shrink:0;display:flex;align-items:center;gap:5px;}
.cbr-track{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.cbr-fill{height:100%;border-radius:99px;transition:width .4s;}
.cbr-val{font-size:11px;color:var(--text3);width:64px;text-align:right;flex-shrink:0;}

/* CUSTOM CHART */
.cust-chart-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:10px;}
.cust-chart-controls{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.cust-label{font-size:12px;color:var(--text2);font-weight:600;white-space:nowrap;}
.cust-select{background:var(--white);border:1.5px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.cust-select:focus{border-color:var(--accent);}
.mini-chart-wrap{position:relative;height:130px;}
.ptabs{display:flex;gap:4px;}
.ptab{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1.5px solid var(--border);background:none;color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.ptab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}

/* ── RIGHT ── */
.right-title{font-size:19px;font-weight:700;letter-spacing:-.4px;margin-bottom:16px;}

/* ITEM GROUP */
.item-group{margin-bottom:16px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.group-hdr{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.gh-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;}

/* COL HEADER */
.col-hdr{display:grid;grid-template-columns:1fr 130px 160px 1fr 62px;gap:7px;padding:7px 14px;background:var(--bg);border-bottom:1px solid var(--border);}
.col-hdr span{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.3px;}
.col-hdr span:nth-child(2){text-align:right;}
.col-hdr span:nth-child(5){text-align:center;}

/* ITEM ROW */
.item-row{display:grid;grid-template-columns:1fr 130px 160px 1fr 62px;gap:7px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--bg);transition:background .1s;}
.item-row:last-child{border-bottom:none;}
.item-row:hover{background:var(--surface);}
.ir-name-disp{font-size:14px;font-weight:500;cursor:pointer;padding:2px 4px;border-radius:4px;}
.ir-name-disp:hover{background:var(--border);text-decoration:underline;}
.ir-name-inp{font-size:14px;font-weight:500;background:var(--white);border:1.5px solid var(--accent);border-radius:6px;padding:5px 8px;outline:none;width:100%;font-family:'Noto Sans KR',sans-serif;color:var(--text);}

.ir-amount{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:14px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;text-align:right;width:100%;transition:border-color .15s;}
.ir-amount:focus{border-color:var(--accent);background:var(--white);}
.ir-amount::placeholder{color:var(--text3);}
.ir-account{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;width:100%;cursor:pointer;transition:border-color .15s;}
.ir-account:focus{border-color:var(--accent);}
.ir-memo{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;width:100%;transition:border-color .15s;}
.ir-memo:focus{border-color:var(--accent);}
.ir-memo::placeholder{color:var(--text3);}
.row-btns{display:flex;gap:4px;justify-content:center;align-items:center;}
.ir-btn{width:26px;height:26px;border-radius:5px;border:1.5px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.ir-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l);}
.ir-del:hover{border-color:var(--red);color:var(--red);background:var(--red-l);}

/* ADD ROW */
.add-row-wrap{padding:8px 14px;border-top:1px dashed var(--border);}
.add-row{display:grid;grid-template-columns:1fr 130px 160px 1fr 62px;gap:7px;align-items:center;}
.add-row input,.add-row select{background:var(--surface);border:1.5px dashed var(--border2);border-radius:7px;padding:8px 9px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;transition:border-color .15s;width:100%;}
.add-row input:focus,.add-row select:focus{border-color:var(--accent);border-style:solid;}
.add-row input::placeholder{color:var(--text3);}
.add-row-btns{display:flex;gap:4px;justify-content:center;}
.add-btn{width:26px;height:26px;border-radius:5px;background:var(--accent);color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;}
.add-btn:hover{opacity:.82;}

/* MEMO */
.memo-wrap{margin-top:14px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.memo-lbl{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.memo-wrap textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;resize:vertical;min-height:68px;outline:none;transition:border-color .15s;}
.memo-wrap textarea:focus{border-color:var(--accent);}

/* SAVE BAR */
.save-bar{position:sticky;bottom:0;background:rgba(242,240,235,.96);backdrop-filter:blur(8px);padding:14px 0 6px;display:flex;gap:12px;align-items:center;margin-top:14px;}
.btn-save{flex:1;padding:13px;border-radius:9px;background:var(--accent);color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s;}
.btn-save:hover{opacity:.88;}
.save-st{font-size:13px;color:var(--text3);}

/* ANALYTICS */
.analytics-wrap{padding:24px;}
.dash-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.dash-title{font-size:20px;font-weight:700;letter-spacing:-.4px;}
.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.sc-lbl{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.sc-val{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.sc-sub{font-size:12px;color:var(--text2);margin-top:4px;}
.sc-green .sc-val{color:var(--accent);}
.sc-red .sc-val{color:var(--red);}
.sc-yellow .sc-val{color:var(--yellow);}
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.chart-card h3{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px;}
.span2{grid-column:span 2;}.span3{grid-column:span 3;}.span4{grid-column:span 4;}
.cat-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.cat-leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.top-table{width:100%;border-collapse:collapse;}
.top-table th{text-align:left;font-size:11px;color:var(--text3);padding:6px 8px;border-bottom:1px solid var(--border);font-weight:700;}
.top-table td{padding:9px 8px;border-bottom:1px solid var(--bg);font-size:13px;}
.top-table tr:last-child td{border-bottom:none;}
.td-amt{text-align:right;font-weight:600;}
.tc span{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;}

/* CAT STYLES */
.cat-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-대출{background:#e74c3c}.dot-고정비{background:#e67e22}.dot-보험{background:#1abc9c}
.dot-카드{background:#3498db}.dot-공과금{background:#9b59b6}.dot-저축{background:#2ecc71}
.dot-용돈{background:#e07c6c}.dot-경조사{background:#95a5a6}.dot-기타{background:#bdc3c7}
.bar-대출{background:#e74c3c}.bar-고정비{background:#e67e22}.bar-보험{background:#1abc9c}
.bar-카드{background:#3498db}.bar-공과금{background:#9b59b6}.bar-저축{background:#2ecc71}
.bar-용돈{background:#e07c6c}.bar-경조사{background:#95a5a6}.bar-기타{background:#bdc3c7}
.bg-대출{background:#e74c3c22;color:#b83228}.bg-고정비{background:#e67e2222;color:#9c5500}
.bg-보험{background:#1abc9c22;color:#0e7a6a}.bg-카드{background:#3498db22;color:#1a6a9e}
.bg-공과금{background:#9b59b622;color:#6a2e8e}.bg-저축{background:#2ecc7122;color:#1a8a4a}
.bg-용돈{background:#e07c6c22;color:#9a3a2a}.bg-경조사{background:#95a5a622;color:#5a6a6a}
.bg-기타{background:#bdc3c722;color:#7a8a8a}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;z-index:9999;background:var(--text);color:#fff;border-radius:8px;padding:11px 20px;font-size:14px;transform:translateY(60px);opacity:0;transition:transform .25s,opacity .25s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:960px){
  .app-layout{grid-template-columns:1fr;}
  .panel-left{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--border);}
  .col-hdr,.item-row,.add-row{grid-template-columns:1fr 120px 140px 1fr 56px;}
}
@media(max-width:1100px){
  .dashboard{grid-template-columns:repeat(2,1fr);}
  .span3,.span4{grid-column:span 2;}
}
@media(max-width:640px){
  .dashboard{grid-template-columns:1fr 1fr;}
  .span2,.span3,.span4{grid-column:span 2;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lbox">
    <div class="logo">Family Budget</div>
    <h1>🏡 경제정리</h1>
    <p>비밀번호를 입력해주세요</p>
    <input type="password" id="pw-input" placeholder="••••••" maxlength="10"/>
    <div class="lerr" id="lerr">비밀번호가 틀렸어요</div>
    <button onclick="doLogin()">확인</button>
  </div>
</div>

<!-- NAV -->
<nav id="main-nav" style="display:none">
  <div class="nav-brand">🏡 경제정리</div>
  <div class="nav-tabs">
    <button class="ntab active" onclick="switchTab('input',this)">입력</button>
    <button class="ntab" onclick="switchTab('analytics',this)">분석</button>
  </div>
  <div class="nav-right"><button class="bsm" onclick="logout()">로그아웃</button></div>
</nav>

<!-- INPUT TAB -->
<div id="tab-input" style="display:none">
  <div class="app-layout">

    <!-- LEFT -->
    <div class="panel-left">
      <div class="li">
        <!-- 월 네비 -->
        <div class="mnrow">
          <div class="mnbtns">
            <button class="mnbtn" onclick="changeMonth(-1)">‹</button>
            <span class="mtitle" id="month-label">-</span>
            <button class="mnbtn" onclick="changeMonth(1)">›</button>
          </div>
        </div>

        <!-- 이달의 한마디 -->
        <input class="goal-inp" id="goal-inp" placeholder="✏️ 이달의 한마디"/>

        <!-- 월급 inline -->
        <div class="inc-cards">
          <div class="inc-card">
            <div class="ic-lbl">상겸 월급</div>
            <div class="ic-disp" id="disp-sg" onclick="startEditInc('sg')">미입력</div>
            <input class="ic-inp" id="edit-sg" type="text" placeholder="0"
              onblur="commitInc('sg')" onkeydown="if(event.key==='Enter')commitInc('sg')"
              oninput="onAmtInput(this)"/>
          </div>
          <div class="inc-card">
            <div class="ic-lbl">효정 월급</div>
            <div class="ic-disp" id="disp-hj" onclick="startEditInc('hj')">미입력</div>
            <input class="ic-inp" id="edit-hj" type="text" placeholder="0"
              onblur="commitInc('hj')" onkeydown="if(event.key==='Enter')commitInc('hj')"
              oninput="onAmtInput(this)"/>
          </div>
        </div>

        <!-- HUB -->
        <div class="hub-box">
          <div>
            <div class="hb-lbl">HUB 합산</div>
            <div class="hb-val" id="hub-income">₩ 0</div>
          </div>
          <div style="text-align:right">
            <div class="hb-lbl">잔액</div>

function makeItemRow(def,saved,cat){
  const r=document.createElement('div');
  r.className='item-row';r.dataset.name=def.name;
  const accOpts=ACCOUNTS.map(a=>`<option value="${a}"${saved?.account===a?' selected':''}>${a}</option>`).join('');
  r.innerHTML=`
    <div class="ir-name-disp" onclick="startRenameItem(this,'${def.name}')">${def.name}</div>
    <input class="ir-amount" type="text" placeholder="₩ 0"

      data-field="amount" data-name="${def.name}"

      <option value="">계좌 선택</option>${accOpts}
    </select>
    <input class="ir-memo" type="text" placeholder="메모"
      value="${saved?.memo||''}"
      data-field="memo" data-name="${def.name}"
      onblur="onFieldChange(this)"/>
    <div class="row-btns">
      <button class="ir-btn" title="항목명 수정" onclick="startRenameItem(this.closest('.item-row').querySelector('.ir-name-disp'),'${def.name}')">✏️</button>
      <button class="ir-btn ir-del" title="삭제" onclick="deleteItemDef('${def.name}')">×</button>
    </div>`;

}

// ── 항목명 수정 ──
window.startRenameItem=function(dispEl,origName){
  if(dispEl.tagName==='INPUT') return; // already editing
  const inp=document.createElement('input');
  inp.className='ir-name-inp';inp.value=origName;
  dispEl.replaceWith(inp);
  inp.focus();inp.select();
  const finish=()=>{
    const newName=inp.value.trim()||origName;
    // update itemDefs
    const idx=itemDefs.findIndex(d=>d.name===origName);
    if(idx>-1) itemDefs[idx].name=newName;
    // update mData items
    const item=(mData.items||[]).find(i=>i.name===origName);
    if(item) item.name=newName;
    // update DOM
    const newDisp=document.createElement('div');
    newDisp.className='ir-name-disp';newDisp.textContent=newName;
    newDisp.setAttribute('onclick',`startRenameItem(this,'${newName}')`);
    inp.replaceWith(newDisp);
    // update data-name on sibling inputs
    const row=newDisp.closest('.item-row');
    if(row){row.dataset.name=newName;row.querySelectorAll('[data-name]').forEach(x=>x.dataset.name=newName);}
    // update del button
    const delBtn=row?.querySelector('.ir-del');
    if(delBtn) delBtn.setAttribute('onclick',`deleteItemDef('${newName}')`);
    saveItemDefs();
  };
  inp.addEventListener('blur',finish);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){inp.blur();}if(e.key==='Escape'){inp.value=origName;inp.blur();}});
};

// ── 항목 삭제 ──
window.deleteItemDef=async function(name){
  if(!confirm(`"${name}" 항목을 삭제할까요?\n이달 입력값도 함께 제거돼요.`)) return;
  itemDefs=itemDefs.filter(d=>d.name!==name);
  if(mData.items) mData.items=mData.items.filter(i=>i.name!==name);
  await saveItemDefs();
  renderItemsContainer();renderSummary();
};

// ── 빠른 추가 ──
window.quickAdd=async function(cat,ck){
  const nameEl=document.getElementById(`qa-n-${ck}`);
  const amtEl=document.getElementById(`qa-a-${ck}`);
  const accEl=document.getElementById(`qa-acc-${ck}`);
  const memoEl=document.getElementById(`qa-m-${ck}`);
  const name=nameEl.value.trim();
  if(!name){nameEl.focus();return;}
  const amount=Number((amtEl.value||'').replace(/[^\d]/g,''))||0;
  const account=accEl?.value||'';const memo=memoEl?.value||'';
  if(!itemDefs.find(d=>d.name===name)) itemDefs.push({name,cat});
  await saveItemDefs();
  if(!mData.items) mData.items=[];
  let item=mData.items.find(i=>i.name===name);
  if(!item){item={name,cat,amount:0,account:'',memo:''};mData.items.push(item);}
  item.amount=amount;item.account=account;item.memo=memo;
  renderItemsContainer();renderSummary();updateCustTargetOptions();
  showToast(`"${name}" 추가됐어요 ✓`);
};

// ── SUMMARY ──
function renderSummary(){
  const sg=mData.income?.sanggyeom||0,hj=mData.income?.hyojeong||0;
  const total=sg+hj;
  const exp=(mData.items||[]).reduce((s,i)=>s+(Number(i.amount)||0),0);
  const bal=total-exp;const ratio=total?Math.round(exp/total*100):0;
  document.getElementById('hub-income').textContent='₩ '+fmt(total);
  document.getElementById('hub-balance').textContent='₩ '+fmt(bal);
  document.getElementById('hub-sub').textContent=bal===0?'딱 맞아요 ✓':bal>0?'남아요':'초과!';
  const rf=document.getElementById('ratio-fill');
  rf.style.width=Math.min(ratio,100)+'%';
  rf.style.background=ratio>90?'#b83228':ratio>70?'#e67e22':'var(--accent)';
  document.getElementById('ratio-pct').textContent=ratio+'%';
  document.getElementById('ratio-pct').style.color=ratio>90?'var(--red)':ratio>70?'var(--yellow)':'var(--accent)';
  document.getElementById('total-exp').textContent='₩ '+fmt(exp);
  // cat bars
  const catT={};(mData.items||[]).forEach(i=>{catT[i.cat]=(catT[i.cat]||0)+(Number(i.amount)||0);});
  const maxC=Math.max(...Object.values(catT),1);
  document.getElementById('cat-bars').innerHTML=Object.entries(catT).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`
    <div class="cbr">
      <div class="cbr-label"><span class="cat-dot dot-${cat}"></span>${cat}</div>
      <div class="cbr-track"><div class="cbr-fill bar-${cat}" style="width:${Math.round(val/maxC*100)}%"></div></div>
      <div class="cbr-val">${fmtS(val)}</div>
    </div>`).join('');
  renderCustChart();
}

// ── CUSTOM CHART ──
function updateCustTargetOptions(){
  const type=document.getElementById('cust-type').value;
  const sel=document.getElementById('cust-target');
  const prev=sel.value;
  if(type==='cat'){
    sel.innerHTML=CATS.map(c=>`<option value="${c}">${c}</option>`).join('');
  } else {
    const names=[...new Set(itemDefs.map(d=>d.name))];
    sel.innerHTML=names.map(n=>`<option value="${n}">${n}</option>`).join('');
  }
  if(prev) sel.value=prev;
  renderCustChart();
}
window.renderCustChart=function(){
  const type=document.getElementById('cust-type').value;
  const target=document.getElementById('cust-target').value;
  if(!target) return;
  const keys=Object.keys(allData).sort();
  let labels=[],data=[];
  if(custP==='monthly'){
    keys.forEach(k=>{
      const d=allData[k],[y,m]=k.split('-');
      labels.push(`${y}.${m}`);
      if(type==='cat') data.push((d.items||[]).filter(i=>i.cat===target).reduce((s,i)=>s+(Number(i.amount)||0),0));
      else data.push((d.items||[]).find(i=>i.name===target)?.amount||0);
    });
  } else {
    const qm={};
    keys.forEach(k=>{const d=allData[k];const[y,m]=k.split('-').map(Number);const q=`${y} Q${Math.ceil(m/3)}`;
      if(!qm[q])qm[q]=0;
      if(type==='cat') qm[q]+=(d.items||[]).filter(i=>i.cat===target).reduce((s,i)=>s+(Number(i.amount)||0),0);
      else qm[q]+=(d.items||[]).find(i=>i.name===target)?.amount||0;
    });
    Object.entries(qm).forEach(([q,v])=>{labels.push(q);data.push(v);});
  }
  if(charts.cust) charts.cust.destroy();
  const color=type==='cat'?(CAT_COLORS[target]||'#3498db'):'#3498db';
  charts.cust=new Chart(document.getElementById('cust-chart').getContext('2d'),{
    type:'line',
    data:{labels,datasets:[{
      label:target,data,
      borderColor:color,backgroundColor:color+'22',
      tension:.4,fill:true,pointBackgroundColor:color,pointRadius:4,
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9e9a90',font:{size:11},boxWidth:8}}},
      scales:{x:{ticks:{color:'#9e9a90',font:{size:11}},grid:{display:false}},
              y:{ticks:{color:'#9e9a90',font:{size:11},callback:v=>fmtS(v)},grid:{color:'#ede9e2'}}}}
  });
};
window.setCustP=function(p,btn){
  custP=p;
  document.querySelectorAll('.cust-chart-wrap .ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderCustChart();
};

// ── FIELD HANDLERS ──
window.onAmtInput=function(el){
  const raw=el.value.replace(/[^\d]/g,'');
  el.value=raw?'₩ '+Number(raw).toLocaleString('ko-KR'):'';
};
window.onAmtBlur=function(el){updateItem(el);renderSummary();};
window.onFieldChange=function(el){updateItem(el);};
function updateItem(el){
  const name=el.dataset.name,field=el.dataset.field;
  let val=el.value;
  if(field==='amount') val=Number(val.replace(/[^\d]/g,''))||0;
  if(!mData.items) mData.items=[];
  let item=mData.items.find(i=>i.name===name);
  const def=itemDefs.find(d=>d.name===name);
  if(!item){item={name,cat:def?.cat||'기타',amount:0,account:'',memo:''};mData.items.push(item);}
  item[field]=val;
}

// ── MONTH CHANGE ──
window.changeMonth=async function(dir){
  collectInputs();
  curM+=dir;if(curM>12){curM=1;curY++;}if(curM<1){curM=12;curY--;}
  const k=mk(curY,curM);
  mData=allData[k]?JSON.parse(JSON.stringify(allData[k])):{income:{sanggyeom:0,hyojeong:0},items:[],memo:'',goal:'',loans:[]};
  if(!mData.loans) mData.loans=[];
  renderAll();
};
function collectInputs(){
  document.querySelectorAll('.item-row[data-name]').forEach(row=>{
    const name=row.dataset.name;
    const amtEl=row.querySelector('[data-field="amount"]');
    const accEl=row.querySelector('[data-field="account"]');
    const memoEl=row.querySelector('[data-field="memo"]');
    if(!amtEl) return;
    const amount=Number((amtEl.value||'').replace(/[^\d]/g,''))||0;
    const account=accEl?.value||'';const memo=memoEl?.value||'';
    if(amount||account||memo){
      if(!mData.items) mData.items=[];
      let item=mData.items.find(i=>i.name===name);
      const def=itemDefs.find(d=>d.name===name);
      if(!item){item={name,cat:def?.cat||'기타',amount:0,account:'',memo:''};mData.items.push(item);}
      item.amount=amount;item.account=account;item.memo=memo;
    }
  });
  // collect loans
  document.querySelectorAll('.loan-row').forEach((row,i)=>{
    const nameEl=row.querySelector('.loan-name-inp');
    const amtEl=row.querySelector('.loan-amt-inp');
    if(nameEl&&amtEl&&mData.loans[i]){
      mData.loans[i].name=nameEl.value;
      mData.loans[i].amount=Number((amtEl.value||'').replace(/[^\d]/g,''))||0;
    }
  });
  mData.memo=document.getElementById('memo-text').value;
  mData.goal=document.getElementById('goal-inp').value;
}

// ── SAVE ──
window.saveAll=async function(){
  collectInputs();
  document.getElementById('save-st').textContent='저장 중...';
  try{
    await saveMonthData();
    document.getElementById('save-st').textContent='저장됐어요 ✓';
    setTimeout(()=>document.getElementById('save-st').textContent='',3000);
    showToast('저장됐어요 ✓');
  }catch(e){document.getElementById('save-st').textContent='오류 발생';}
};

// ── ANALYTICS ──
window.setAP=function(p,btn){
  aP=p;
  document.querySelectorAll('#tab-analytics .ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderDashboard();
};

function getAgg(period){
  const keys=Object.keys(allData).sort();
  if(period==='monthly'){
    return keys.map(k=>{
      const d=allData[k],[y,m]=k.split('-');
      const i=(d.income?.sanggyeom||0)+(d.income?.hyojeong||0);
      const e=(d.items||[]).reduce((s,x)=>s+(Number(x.amount)||0),0);
      return{label:`${y}.${m}`,inc:i,exp:e,bal:i-e,items:d.items||[]};
    });
  } else if(period==='quarterly'){
    const qm={};
    keys.forEach(k=>{const d=allData[k];const[y,m]=k.split('-').map(Number);const q=`${y} Q${Math.ceil(m/3)}`;
      if(!qm[q])qm[q]={label:q,inc:0,exp:0,bal:0,items:[]};
      qm[q].inc+=(d.income?.sanggyeom||0)+(d.income?.hyojeong||0);
      qm[q].exp+=(d.items||[]).reduce((s,x)=>s+(Number(x.amount)||0),0);
      qm[q].items=[...qm[q].items,...(d.items||[])];
    });
    return Object.values(qm).map(v=>({...v,bal:v.inc-v.exp}));
  } else {
    const ym={};
    keys.forEach(k=>{const d=allData[k];const y=k.split('-')[0];
      if(!ym[y])ym[y]={label:y+'년',inc:0,exp:0,bal:0,items:[]};
      ym[y].inc+=(d.income?.sanggyeom||0)+(d.income?.hyojeong||0);
      ym[y].exp+=(d.items||[]).reduce((s,x)=>s+(Number(x.amount)||0),0);
      ym[y].items=[...ym[y].items,...(d.items||[])];
    });
    return Object.values(ym).map(v=>({...v,bal:v.inc-v.exp}));
  }
}

function renderDashboard(){
  const agg=getAgg(aP);
  if(!agg.length){document.getElementById('dashboard').innerHTML='<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--text3);font-size:15px">아직 데이터가 없어요</div>';return;}
  const latest=agg[agg.length-1];const prev=agg.length>1?agg[agg.length-2]:null;
  const allItems=Object.values(allData).flatMap(d=>d.items||[]);
  const avgExp=agg.length?Math.round(agg.reduce((s,a)=>s+a.exp,0)/agg.length):0;
  const avgInc=agg.length?Math.round(agg.reduce((s,a)=>s+a.inc,0)/agg.length):0;
  const totalSaved=agg.reduce((s,a)=>s+Math.max(a.bal,0),0);
  const expDiff=prev?latest.exp-prev.exp:0;
  const itemAgg={};allItems.forEach(i=>{if(!itemAgg[i.name])itemAgg[i.name]={name:i.name,cat:i.cat,total:0};itemAgg[i.name].total+=Number(i.amount)||0;});
  const topItems=Object.values(itemAgg).sort((a,b)=>b.total-a.total).slice(0,6);
  const latCat={};(latest.items||[]).forEach(i=>{latCat[i.cat]=(latCat[i.cat]||0)+(Number(i.amount)||0);});
  const pieLabels=Object.keys(latCat),pieData=Object.values(latCat),pieColors=pieLabels.map(c=>CAT_COLORS[c]||'#bdc3c7');
  const labels=agg.map(a=>a.label);
  const scOpts={x:{ticks:{color:'#9e9a90',font:{size:11}},grid:{display:false}},y:{ticks:{color:'#9e9a90',font:{size:11},callback:v=>fmtS(v)},grid:{color:'#ede9e2'}}};
  const legOpts={labels:{color:'#5e5a52',font:{size:11},boxWidth:10}};

  document.getElementById('dashboard').innerHTML=`
    <div class="stat-card sc-green">
      <div class="sc-lbl">평균 월 수입</div>
      <div class="sc-val">₩ ${fmtS(avgInc)}</div>
      <div class="sc-sub">${agg.length}개월 평균</div>
    </div>
    <div class="stat-card sc-red">
      <div class="sc-lbl">평균 월 지출</div>
      <div class="sc-val">₩ ${fmtS(avgExp)}</div>
      <div class="sc-sub">${agg.length}개월 평균</div>
    </div>
    <div class="stat-card sc-yellow">
      <div class="sc-lbl">누적 잔액 합계</div>
      <div class="sc-val">₩ ${fmtS(totalSaved)}</div>
      <div class="sc-sub">전체 기간</div>
    </div>
    <div class="stat-card ${expDiff>0?'sc-red':expDiff<0?'sc-green':''}">
      <div class="sc-lbl">전월 대비 지출</div>
      <div class="sc-val">${expDiff===0?'-':(expDiff>0?'▲':'▼')+' ₩ '+fmtS(Math.abs(expDiff))}</div>
      <div class="sc-sub">${prev?prev.label+' → '+latest.label:'데이터 부족'}</div>
    </div>
    <div class="chart-card span2"><h3>수입 vs 지출 추이</h3><canvas id="ch-ie" height="200"></canvas></div>
    <div class="chart-card span2"><h3>HUB 잔액 흐름</h3><canvas id="ch-bal" height="200"></canvas></div>
    <div class="chart-card span2"><h3>카테고리별 지출 추이</h3><canvas id="ch-cat" height="220"></canvas></div>
    <div class="chart-card span1"><h3>${latest.label} 카테고리 비중</h3><canvas id="ch-pie" height="200"></canvas><div class="cat-legend" id="pie-leg"></div></div>
    <div class="chart-card span1"><h3>지출 비율 추이 (%)</h3><canvas id="ch-ratio" height="200"></canvas></div>
    <div class="chart-card span4">
      <h3>항목별 누적 지출 TOP 6</h3>
      <table class="top-table">
        <thead><tr><th>항목</th><th>카테고리</th><th style="text-align:right">누적 합계</th></tr></thead>
        <tbody>${topItems.map(it=>`
          <tr>
            <td>${it.name}</td>
            <td class="tc"><span class="bg-${it.cat}">${it.cat}</span></td>
            <td class="td-amt">₩ ${fmt(it.total)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  new Chart(document.getElementById('ch-ie').getContext('2d'),{type:'bar',data:{labels,datasets:[
    {label:'수입',data:agg.map(a=>a.inc),backgroundColor:'rgba(42,82,37,.15)',borderColor:'#2a5225',borderWidth:2,borderRadius:4},
    {label:'지출',data:agg.map(a=>a.exp),backgroundColor:'rgba(184,50,40,.15)',borderColor:'#b83228',borderWidth:2,borderRadius:4},
  ]},options:{responsive:true,plugins:{legend:legOpts},scales:scOpts}});

  new Chart(document.getElementById('ch-bal').getContext('2d'),{type:'line',data:{labels,datasets:[{
    label:'HUB 잔액',data:agg.map(a=>a.bal),borderColor:'#2a5225',backgroundColor:'rgba(42,82,37,.08)',tension:.4,fill:true,pointBackgroundColor:'#2a5225',pointRadius:4,
  }]},options:{responsive:true,plugins:{legend:legOpts},scales:scOpts}});

  const catDs=CATS.map(cat=>({
    label:cat,
    data:agg.map(a=>(a.items||[]).filter(i=>i.cat===cat).reduce((s,i)=>s+(Number(i.amount)||0),0)),
    backgroundColor:CAT_COLORS[cat]+'55',borderColor:CAT_COLORS[cat],borderWidth:1,borderRadius:3,
  })).filter(ds=>ds.data.some(v=>v>0));
  new Chart(document.getElementById('ch-cat').getContext('2d'),{type:'bar',data:{labels,datasets:catDs},
    options:{responsive:true,plugins:{legend:legOpts},
      scales:{x:{stacked:true,ticks:{color:'#9e9a90',font:{size:11}},grid:{display:false}},
              y:{stacked:true,ticks:{color:'#9e9a90',font:{size:11},callback:v=>fmtS(v)},grid:{color:'#ede9e2'}}}}});

  if(pieLabels.length){
    new Chart(document.getElementById('ch-pie').getContext('2d'),{type:'doughnut',data:{labels:pieLabels,datasets:[{data:pieData,backgroundColor:pieColors,borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,plugins:{legend:{display:false}}}});
    document.getElementById('pie-leg').innerHTML=pieLabels.map((l,i)=>`
      <div class="cat-leg-item"><span class="leg-dot" style="background:${pieColors[i]}"></span>${l}: ₩ ${fmtS(pieData[i])}</div>`).join('');
  }

  new Chart(document.getElementById('ch-ratio').getContext('2d'),{type:'line',data:{labels,datasets:[{
    label:'지출 비율',data:agg.map(a=>a.inc?Math.round(a.exp/a.inc*100):0),
    borderColor:'#e67e22',backgroundColor:'rgba(230,126,34,.08)',tension:.4,fill:true,pointBackgroundColor:'#e67e22',pointRadius:4,
  }]},options:{responsive:true,plugins:{legend:legOpts},
    scales:{x:{ticks:{color:'#9e9a90',font:{size:11}},grid:{display:false}},
            y:{ticks:{color:'#9e9a90',font:{size:11},callback:v=>v+'%'},grid:{color:'#ede9e2'},max:120}}}});
}

// ── UTILS ──
function fmt(n){return Number(n||0).toLocaleString('ko-KR');}
function fmtS(n){n=Number(n||0);if(n>=100000000)return(n/100000000).toFixed(1)+'억';if(n>=10000)return Math.round(n/10000)+'만';return n.toLocaleString('ko-KR');}
window.showToast=function(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);};
</script>
</body>
