<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제정리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Gmarket+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f0eb;--white:#fff;--surface:#f8f7f4;--border:#e4e0d8;--border2:#cbc6bb;
  --text:#1c1a17;--text2:#5e5a52;--text3:#9e9a90;
  --accent:#2a5225;--accent-l:#e5efe3;
  --red:#b83228;--red-l:#fcecea;
  --yellow:#a67c00;
  --radius:10px;--shadow:0 1px 4px rgba(0,0,0,.07),0 4px 18px rgba(0,0,0,.05);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;font-size:15px;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
.lbox{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:52px 48px;width:360px;text-align:center;box-shadow:var(--shadow);}
.lbox h1{font-size:24px;font-weight:700;margin-bottom:8px;}
.lbox p{color:var(--text2);font-size:14px;margin-bottom:24px;}
.lbox input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:14px;font-size:20px;letter-spacing:8px;text-align:center;outline:none;color:var(--text);transition:border-color .2s;margin-bottom:0;}
.lbox input:focus{border-color:var(--accent);}
.lerr{color:var(--red);font-size:13px;margin:10px 0;display:none;min-height:20px;}
.lbox .lbtn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.lbox .lbtn:hover{opacity:.88;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:54px;}
.nav-brand{font-family:'Gmarket Sans',sans-serif;font-size:16px;font-weight:700;color:var(--accent);}
.nav-tabs{display:flex;gap:3px;}
.ntab{padding:7px 18px;border-radius:7px;font-size:14px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .15s;}
.ntab.active{background:var(--accent-l);color:var(--accent);font-weight:700;}
.ntab:hover:not(.active){background:var(--bg);}
.nav-right{display:flex;gap:8px;}
.bsm{padding:8px 16px;border-radius:7px;font-size:14px;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .15s;}
.bsm:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l);}

/* LAYOUT */
.app-layout{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 54px);}
.panel-left{background:var(--white);border-right:1px solid var(--border);overflow-y:auto;position:sticky;top:54px;max-height:calc(100vh - 54px);}
.li{padding:24px 22px;}
.panel-right{padding:28px;overflow-y:auto;max-height:calc(100vh - 54px);}

/* MONTH NAV */
.mnrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.mnbtns{display:flex;align-items:center;gap:10px;}
.mnbtn{width:32px;height:32px;border-radius:7px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.mnbtn:hover{border-color:var(--accent);color:var(--accent);}
.mtitle{font-family:'Gmarket Sans',sans-serif;font-size:20px;font-weight:700;}

/* GOAL */
.goal-wrap{position:relative;margin-bottom:14px;}
.goal-static{font-size:14px;color:var(--text);padding:11px 14px 11px 36px;cursor:text;border-radius:9px;border:1.5px solid transparent;transition:border-color .2s;min-height:44px;background:var(--surface);}
.goal-static:hover{border-color:var(--border);}
.goal-static.empty{color:var(--text3);}
.goal-pencil{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;user-select:none;}
.goal-inp-el{width:100%;background:var(--surface);border:1.5px solid var(--accent);border-radius:9px;padding:11px 14px 11px 36px;font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;display:none;}

/* INCOME */
.inc-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.inc-card{background:var(--accent-l);border:1.5px solid #c2d9be;border-radius:var(--radius);padding:14px;}
.ic-lbl{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:6px;}
.ic-disp{font-size:15px;font-weight:700;color:var(--accent);cursor:pointer;}
.ic-disp:hover{text-decoration:underline;}
.ic-inp{width:100%;background:var(--white);border:1.5px solid var(--accent);border-radius:6px;padding:6px 8px;font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;display:none;text-align:right;}

/* EXTRA INCOME */
.extra-inc-section{margin-bottom:12px;}
.extra-inc-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;}
.extra-inc-row{display:flex;align-items:center;gap:6px;}
.ei-name{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;padding:7px 9px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;}
.ei-name:focus{border-color:var(--accent);}
.ei-amt{width:120px;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;padding:7px 9px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;text-align:right;}
.ei-amt:focus{border-color:var(--accent);}
.ei-del{width:26px;height:26px;border-radius:5px;border:1.5px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.ei-del:hover{border-color:var(--red);color:var(--red);background:var(--red-l);}
.add-extra-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:2px 0;font-family:'Noto Sans KR',sans-serif;font-weight:600;}
.add-extra-btn:hover{text-decoration:underline;}

/* HUB BOX */
.hub-box{background:var(--text);color:#fff;border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.hb-lbl{font-size:11px;opacity:.55;margin-bottom:4px;}
.hb-val{font-size:20px;font-weight:700;}
.hb-sub{font-size:11px;opacity:.45;margin-top:3px;}

/* LOAN SECTION */
.loan-section{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.loan-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.loan-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;}
.loan-add-btn{padding:4px 10px;border-radius:6px;font-size:12px;background:var(--accent-l);color:var(--accent);border:1.5px solid #c2d9be;cursor:pointer;font-weight:700;font-family:'Noto Sans KR',sans-serif;}
.loan-rows{display:flex;flex-direction:column;gap:8px;}
.loan-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.loan-row-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.loan-bank{width:110px;background:var(--white);border:1.5px solid var(--border);border-radius:6px;padding:7px 8px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;}
.loan-bank:focus{border-color:var(--accent);}
.loan-amt{width:120px;background:var(--white);border:1.5px solid var(--border);border-radius:6px;padding:7px 8px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;text-align:right;}
.loan-amt:focus{border-color:var(--accent);}
.loan-del{width:26px;height:26px;border-radius:5px;border:1.5px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-left:auto;}
.loan-del:hover{border-color:var(--red);color:var(--red);background:var(--red-l);}
.loan-row-detail{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.loan-detail-inp{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;}
.loan-detail-inp:focus{border-color:var(--accent);}
.loan-detail-inp::placeholder{color:var(--text3);}
.loan-total{font-size:13px;color:var(--text2);text-align:right;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}

/* SAVINGS BOX */
.savings-section{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.savings-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.savings-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;}
.savings-rows{display:flex;flex-direction:column;gap:6px;}
.savings-row{display:flex;align-items:center;gap:8px;}
.savings-lbl{font-size:13px;color:var(--text);font-weight:500;flex:1;}
.savings-amt{width:140px;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;padding:7px 9px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;text-align:right;}
.savings-amt:focus{border-color:var(--accent);}

/* SEC TITLE */
.sec-t{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-t::after{content:'';flex:1;height:1px;background:var(--border);}

/* RATIO */
.ratio-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.ratio-track{flex:1;height:9px;background:var(--border);border-radius:99px;overflow:hidden;}
.ratio-fill{height:100%;border-radius:99px;transition:width .4s,background .4s;}
.ratio-pct{font-size:14px;font-weight:700;width:40px;text-align:right;}

/* CAT BARS */
.cat-bars{display:flex;flex-direction:column;gap:8px;}
.cbr{display:flex;align-items:center;gap:8px;}
.cbr-label{font-size:12px;color:var(--text2);width:90px;flex-shrink:0;display:flex;align-items:center;gap:5px;}
.cbr-track{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.cbr-fill{height:100%;border-radius:99px;transition:width .4s;}
.cbr-val{font-size:11px;color:var(--text3);width:64px;text-align:right;flex-shrink:0;}

/* CUSTOM CHART */
.cust-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:10px;}
.cust-controls{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.cust-lbl{font-size:12px;color:var(--text2);font-weight:600;white-space:nowrap;}
.cust-sel{background:var(--white);border:1.5px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.mini-wrap{position:relative;height:130px;}
.ptabs{display:flex;gap:4px;}
.ptab{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1.5px solid var(--border);background:none;color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.ptab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}

/* RIGHT PANEL */
.right-title{font-size:19px;font-weight:700;letter-spacing:-.4px;margin-bottom:16px;}

/* ITEM GROUP */
.item-group{margin-bottom:16px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.group-hdr{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.gh-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;}

/* COL HEADER — with/without account */
.col-hdr{display:grid;gap:7px;padding:7px 14px;background:var(--bg);border-bottom:1px solid var(--border);}
.col-hdr.with-acc{grid-template-columns:1fr 100px 100px 150px 1fr 34px;}
.col-hdr.no-acc{grid-template-columns:1fr 100px 100px 1fr 34px;}
.col-hdr span{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.3px;}
.col-hdr span.r{text-align:right;}
.col-hdr span.c{text-align:center;}

/* ITEM ROW */
.item-row{display:grid;gap:7px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--bg);transition:background .1s;}
.item-row.with-acc{grid-template-columns:1fr 100px 100px 150px 1fr 34px;}
.item-row.no-acc{grid-template-columns:1fr 100px 100px 1fr 34px;}
.item-row:last-child{border-bottom:none;}
.item-row:hover{background:var(--surface);}

/* name display vs input */
.ir-name{font-size:14px;font-weight:700;}
.ir-name-inp{font-size:14px;font-weight:700;background:var(--white);border:1.5px solid var(--accent);border-radius:6px;padding:5px 8px;outline:none;width:100%;font-family:'Noto Sans KR',sans-serif;color:var(--text);}

/* prev month */
.ir-prev{font-size:12px;color:var(--text3);text-align:right;white-space:nowrap;}

.ir-amount{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:7px 9px;font-size:14px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;text-align:right;width:100%;transition:border-color .15s;}
.ir-amount:focus{border-color:var(--accent);background:var(--white);}
.ir-amount::placeholder{color:var(--text3);}
.ir-account{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:6px 8px;font-size:12px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;width:100%;cursor:pointer;transition:border-color .15s;}
.ir-account:focus{border-color:var(--accent);}
.ir-memo{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;width:100%;transition:border-color .15s;}
.ir-memo:focus{border-color:var(--accent);}
.ir-memo::placeholder{color:var(--text3);}
.ir-del{width:28px;height:28px;border-radius:5px;border:1.5px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.ir-del:hover{border-color:var(--red);color:var(--red);background:var(--red-l);}

/* ADD ROW */
.add-row-wrap{padding:8px 14px;border-top:1px dashed var(--border);}
.add-row{display:grid;gap:7px;align-items:center;}
.add-row.with-acc{grid-template-columns:1fr 100px 100px 150px 1fr 34px;}
.add-row.no-acc{grid-template-columns:1fr 100px 100px 1fr 34px;}
.add-row input,.add-row select{background:var(--surface);border:1.5px dashed var(--border2);border-radius:7px;padding:7px 9px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;transition:border-color .15s;width:100%;}
.add-row input:focus,.add-row select:focus{border-color:var(--accent);border-style:solid;}
.add-row input::placeholder{color:var(--text3);}
.add-btn{width:28px;height:28px;border-radius:5px;background:var(--accent);color:#fff;border:none;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;}
.add-btn:hover{opacity:.82;}

/* MEMO */
.memo-wrap{margin-top:14px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.memo-lbl{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.memo-wrap textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;resize:vertical;min-height:68px;outline:none;transition:border-color .15s;}
.memo-wrap textarea:focus{border-color:var(--accent);}

/* SAVINGS BOTTOM */
.savings-bottom{margin-top:14px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.savings-bottom-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;}
.savings-bottom-rows{display:flex;flex-direction:column;gap:8px;}
.sb-row{display:flex;align-items:center;gap:10px;}
.sb-lbl{font-size:14px;font-weight:600;color:var(--text);flex:1;}
.sb-amt{width:150px;background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:14px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;text-align:right;transition:border-color .15s;}
.sb-amt:focus{border-color:var(--accent);}

/* SAVE BAR */
.save-bar{position:sticky;bottom:0;background:rgba(242,240,235,.96);backdrop-filter:blur(8px);padding:14px 0 6px;display:flex;gap:12px;align-items:center;margin-top:14px;}
.btn-save{flex:1;padding:13px;border-radius:9px;background:var(--accent);color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s;}
.btn-save:hover{opacity:.88;}
.save-st{font-size:13px;color:var(--text3);}

/* ANALYTICS */
.analytics-wrap{padding:24px;}
.dash-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.dash-title{font-size:20px;font-weight:700;letter-spacing:-.4px;}
.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.sc-lbl{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.sc-val{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.sc-sub{font-size:12px;color:var(--text2);margin-top:4px;}
.sc-green .sc-val{color:var(--accent);}.sc-red .sc-val{color:var(--red);}.sc-yellow .sc-val{color:var(--yellow);}
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.chart-card h3{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px;}
.span2{grid-column:span 2;}.span3{grid-column:span 3;}.span4{grid-column:span 4;}
.cat-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.cat-leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.top-table{width:100%;border-collapse:collapse;}
.top-table th{text-align:left;font-size:11px;color:var(--text3);padding:6px 8px;border-bottom:1px solid var(--border);font-weight:700;}
.top-table td{padding:9px 8px;border-bottom:1px solid var(--bg);font-size:13px;}
.top-table tr:last-child td{border-bottom:none;}
.td-amt{text-align:right;font-weight:600;}
.tc span{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;}

/* CAT STYLES */
.cat-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-대출이자{background:#e74c3c}.dot-고정비{background:#e67e22}.dot-보험{background:#1abc9c}
.dot-카드{background:#3498db}.dot-지역화폐\/온누리{background:#9b59b6}.dot-저축{background:#2ecc71}
.dot-용돈{background:#e07c6c}.dot-경조사{background:#95a5a6}.dot-기타{background:#bdc3c7}
.bar-대출이자{background:#e74c3c}.bar-고정비{background:#e67e22}.bar-보험{background:#1abc9c}
.bar-카드{background:#3498db}.bar-지역화폐\/온누리{background:#9b59b6}.bar-저축{background:#2ecc71}
.bar-용돈{background:#e07c6c}.bar-경조사{background:#95a5a6}.bar-기타{background:#bdc3c7}
.bg-대출이자{background:#e74c3c22;color:#b83228}.bg-고정비{background:#e67e2222;color:#9c5500}
.bg-보험{background:#1abc9c22;color:#0e7a6a}.bg-카드{background:#3498db22;color:#1a6a9e}
.bg-지역화폐\/온누리{background:#9b59b622;color:#6a2e8e}.bg-저축{background:#2ecc7122;color:#1a8a4a}
.bg-용돈{background:#e07c6c22;color:#9a3a2a}.bg-경조사{background:#95a5a622;color:#5a6a6a}
.bg-기타{background:#bdc3c722;color:#7a8a8a}

.toast{position:fixed;bottom:28px;right:28px;z-index:9999;background:var(--text);color:#fff;border-radius:8px;padding:11px 20px;font-size:14px;transform:translateY(60px);opacity:0;transition:transform .25s,opacity .25s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:1100px){.dashboard{grid-template-columns:repeat(2,1fr);}.span3,.span4{grid-column:span 2;}}
@media(max-width:960px){
  .app-layout{grid-template-columns:1fr;}
  .panel-left{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--border);}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lbox">
    <h1>🏡 경제정리</h1>
    <p>비밀번호를 입력해 주세요</p>
    <input type="password" id="pw-input" placeholder="••••••" maxlength="10"/>
    <div class="lerr" id="lerr">비밀번호가 틀렸어요</div>
    <button class="lbtn" onclick="doLogin()">확인</button>
  </div>
</div>

<nav id="main-nav" style="display:none">
  <div class="nav-brand">🏡 경제정리</div>
  <div class="nav-tabs">
    <button class="ntab active" onclick="switchTab('input',this)">입력</button>
    <button class="ntab" onclick="switchTab('analytics',this)">분석</button>
  </div>
  <div class="nav-right"><button class="bsm" onclick="logout()">로그아웃</button></div>
</nav>

<!-- INPUT TAB -->
<div id="tab-input" style="display:none">
  <div class="app-layout">
    <div class="panel-left">
      <div class="li">
        <div class="mnrow">
          <div class="mnbtns">
            <button class="mnbtn" onclick="changeMonth(-1)">‹</button>
            <span class="mtitle" id="month-label">-</span>
            <button class="mnbtn" onclick="changeMonth(1)">›</button>
          </div>
        </div>

        <!-- 이달의 한마디 -->
        <div class="goal-wrap">
          <span class="goal-pencil">✏️</span>
          <div class="goal-static empty" id="goal-static" onclick="startGoalEdit()">이달의 한마디</div>
          <input class="goal-inp-el" id="goal-inp" placeholder="이달의 한마디"
            onkeydown="if(event.key==='Enter'){event.preventDefault();commitGoal();}"
            onblur="commitGoal()"/>
        </div>

        <!-- 월급 -->
        <div class="inc-cards">
          <div class="inc-card">
            <div class="ic-lbl">상겸 월급</div>
            <div class="ic-disp" id="disp-sg" onclick="startEditInc('sg')">미입력</div>
            <input class="ic-inp" id="edit-sg" type="text"
              onblur="commitInc('sg')" onkeydown="if(event.key==='Enter')commitInc('sg')"
              oninput="onAmtInput(this)"/>
          </div>
          <div class="inc-card">
            <div class="ic-lbl">효정 월급</div>
            <div class="ic-disp" id="disp-hj" onclick="startEditInc('hj')">미입력</div>
            <input class="ic-inp" id="edit-hj" type="text"
              onblur="commitInc('hj')" onkeydown="if(event.key==='Enter')commitInc('hj')"
              oninput="onAmtInput(this)"/>
          </div>
        </div>

        <!-- 추가 수익 -->
        <div class="extra-inc-section">
          <div class="extra-inc-rows" id="extra-inc-rows"></div>
          <button class="add-extra-btn" onclick="addExtraInc()">+ 추가 수익 입력</button>
        </div>

        <!-- HUB -->
        <div class="hub-box">
          <div>
            <div class="hb-lbl">HUB 합산</div>
            <div class="hb-val" id="hub-income">₩ 0</div>
          </div>
          <div style="text-align:right">
            <div class="hb-lbl">잔액</div>
            <div class="hb-val" id="hub-balance">₩ 0</div>
            <div class="hb-sub" id="hub-sub"></div>
          </div>
        </div>

        <!-- 대출 현황 -->
        <div class="loan-section">
          <div class="loan-hdr">
            <span class="loan-title">대출 현황</span>
            <button class="loan-add-btn" onclick="addLoan()">+ 추가</button>
          </div>
          <div class="loan-rows" id="loan-rows"></div>
          <div class="loan-total" id="loan-total" style="display:none"></div>
        </div>

        <!-- 세이프박스/CMA -->
        <div class="savings-section">
          <div class="savings-hdr">
            <span class="savings-title">저축 현황</span>
          </div>
          <div class="savings-rows">
            <div class="savings-row">
              <span class="savings-lbl">세이프박스</span>
              <input class="savings-amt" id="safebox-amt" type="text" placeholder="₩ 0"
                oninput="onAmtInput(this)" onblur="commitSavings()"/>
            </div>
            <div class="savings-row">
              <span class="savings-lbl">미래에셋 CMA</span>
              <input class="savings-amt" id="cma-amt" type="text" placeholder="₩ 0"
                oninput="onAmtInput(this)" onblur="commitSavings()"/>
            </div>
          </div>
        </div>

        <!-- 지출 비율 -->
        <div class="sec-t">지출 비율</div>
        <div class="ratio-row">
          <div class="ratio-track"><div class="ratio-fill" id="ratio-fill" style="width:0%"></div></div>
          <span class="ratio-pct" id="ratio-pct" style="color:var(--accent)">0%</span>
        </div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:16px">총 지출: <span id="total-exp" style="font-weight:700;color:var(--text2)">₩ 0</span></div>

        <!-- 카테고리별 -->
        <div class="sec-t">카테고리별</div>
        <div class="cat-bars" id="cat-bars" style="margin-bottom:16px"></div>

        <!-- 커스텀 추이 -->
        <div class="sec-t">추이 보기</div>
        <div class="cust-wrap">
          <div class="cust-controls">
            <span class="cust-lbl">항목 선택</span>
            <select class="cust-sel" id="cust-type" onchange="updateCustOpts()">
              <option value="cat">카테고리별</option>
              <option value="item">개별 항목</option>
            </select>
            <select class="cust-sel" id="cust-target" onchange="renderCustChart()"></select>
            <div class="ptabs" style="margin-left:auto">
              <button class="ptab active" onclick="setCustP('monthly',this)">월별</button>
              <button class="ptab" onclick="setCustP('quarterly',this)">분기</button>
            </div>
          </div>
          <div class="mini-wrap"><canvas id="cust-chart"></canvas></div>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="panel-right">
      <div class="right-title" id="right-title">경제정리</div>
      <div id="items-container"></div>

      <div class="memo-wrap">
        <div class="memo-lbl">비고</div>
        <textarea id="memo-text" placeholder="이달의 특이사항을 자유롭게 적어주세요"></textarea>
      </div>

      <!-- 세이프박스/CMA (오른쪽 패널 맨 아래) -->
      <div class="savings-bottom">
        <div class="savings-bottom-title">세이프박스 / CMA 잔액</div>
        <div class="savings-bottom-rows">
          <div class="sb-row">
            <span class="sb-lbl">세이프박스</span>
            <input class="sb-amt" id="sb-safebox" type="text" placeholder="₩ 0"
              oninput="onAmtInput(this)" onblur="commitSavingsRight()"/>
          </div>
          <div class="sb-row">
            <span class="sb-lbl">미래에셋 CMA</span>
            <input class="sb-amt" id="sb-cma" type="text" placeholder="₩ 0"
              oninput="onAmtInput(this)" onblur="commitSavingsRight()"/>
          </div>
        </div>
      </div>

      <div class="save-bar">
        <button class="btn-save" onclick="saveAll()">💾 저장하기</button>
        <span class="save-st" id="save-st"></span>
      </div>
    </div>
  </div>
</div>

<!-- ANALYTICS TAB -->
<div id="tab-analytics" style="display:none">
  <div class="analytics-wrap">
    <div class="dash-topbar">
      <div class="dash-title">분석 대시보드</div>
      <div class="ptabs">
        <button class="ptab active" onclick="setAP('monthly',this)">월별</button>
        <button class="ptab" onclick="setAP('quarterly',this)">분기별</button>
        <button class="ptab" onclick="setAP('yearly',this)">연간</button>
      </div>
    </div>
    <div class="dashboard" id="dashboard"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const FB={apiKey:"AIzaSyAS0sesA7ObzNPKSaB9n2xm94hjrpGXYOs",authDomain:"bubu-89d64.firebaseapp.com",projectId:"bubu-89d64",storageBucket:"bubu-89d64.firebasestorage.app",messagingSenderId:"838892867322",appId:"1:838892867322:web:2c774be4c3b51c7e1bc343"};
const app=initializeApp(FB);const db=getFirestore(app);

const PW="871314";
const ACCOUNTS=["상겸 지역농협","효정 급여통장","상겸 우리은행873152","효정 우리은행2530","효정 카카오뱅크","상겸 카카오뱅크"];
const CATS=['대출이자','고정비','보험','카드','지역화폐/온누리','저축','용돈','경조사','기타'];
const CAT_COLORS={'대출이자':'#e74c3c','고정비':'#e67e22','보험':'#1abc9c','카드':'#3498db','지역화폐/온누리':'#9b59b6','저축':'#2ecc71','용돈':'#e07c6c','경조사':'#95a5a6','기타':'#bdc3c7'};
const NO_ACCOUNT_CATS=['지역화폐/온누리'];
const DEFAULT_ITEMS=[
  {name:'대출원리금(농협)',cat:'대출이자'},{name:'대출이자(카뱅)',cat:'대출이자'},
  {name:'관리비',cat:'고정비'},{name:'가스비',cat:'고정비'},
  {name:'청약(상겸)',cat:'저축'},{name:'청약(효정)',cat:'저축'},
  {name:'우체국보험',cat:'보험'},{name:'IM라이프',cat:'보험'},{name:'흥국보험',cat:'보험'},
  {name:'카드값(우리)',cat:'카드'},{name:'KB(쿠팡)',cat:'카드'},{name:'KB(현산)',cat:'카드'},{name:'하나(다우복지)',cat:'카드'},{name:'신한(베스트샵)',cat:'카드'},
  {name:'지역화폐(효정)',cat:'지역화폐/온누리'},{name:'온누리(효정)',cat:'지역화폐/온누리'},
  {name:'용돈(상겸)',cat:'용돈'},{name:'용돈(효정)',cat:'용돈'},
  {name:'경조사',cat:'경조사'},
];

// 현재 월 기준으로 초기화
const now=new Date();
let curY=now.getFullYear(),curM=now.getMonth()+1;
let mData={},itemDefs=[],allData={},charts={},custP='monthly',aP='monthly';

// ── LOGIN ──
window.doLogin=async function(){
  if(document.getElementById('pw-input').value===PW){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-nav').style.display='flex';
    document.getElementById('tab-input').style.display='block';
    await init();
  } else {
    const e=document.getElementById('lerr');
    e.style.display='block';
  }
};
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
window.logout=function(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-nav').style.display='none';
  ['input','analytics'].forEach(t=>document.getElementById('tab-'+t).style.display='none');
};

window.switchTab=function(name,btn){
  ['input','analytics'].forEach(t=>document.getElementById('tab-'+t).style.display='none');
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).style.display='block';
  btn.classList.add('active');
  if(name==='analytics') renderDashboard();
};

async function init(){
  await loadItemDefs();await loadAllData();renderAll();
}

function mk(y,m){return`${y}-${String(m).padStart(2,'0')}`;}
function mkPrev(){
  let py=curY,pm=curM-1;
  if(pm<1){pm=12;py--;}
  return mk(py,pm);
}

async function loadItemDefs(){
  const s=await getDoc(doc(db,'config','itemDefs'));
  itemDefs=s.exists()?(s.data().items||[]):[...DEFAULT_ITEMS];
  if(!s.exists()) await setDoc(doc(db,'config','itemDefs'),{items:itemDefs});
}
async function saveItemDefs(){await setDoc(doc(db,'config','itemDefs'),{items:itemDefs});}

async function loadAllData(){
  const s=await getDocs(collection(db,'months'));
  allData={};s.forEach(d=>{allData[d.id]=d.data();});
  loadMonthData();
}
function loadMonthData(){
  const k=mk(curY,curM);
  if(allData[k]){
    mData=JSON.parse(JSON.stringify(allData[k]));
    if(!mData.loans) mData.loans=[];
    if(!mData.extraInc) mData.extraInc=[];
    if(!mData.savings) mData.savings={safebox:0,cma:0};
  } else {
    // 새 달: 이전 달에서 항목/계좌 복사, 금액/메모는 초기화
    const pk=mkPrev();
    const prev=allData[pk];
    const prevItems=(prev?.items||[]).map(i=>({name:i.name,cat:i.cat,amount:0,account:i.account||'',memo:''}));
    mData={
      income:{sanggyeom:0,hyojeong:0},
      extraInc:[],
      items:prevItems,
      memo:'',goal:'',
      loans:JSON.parse(JSON.stringify(prev?.loans||[])),
      savings:{safebox:0,cma:0}
    };
  }
}
async function saveMonthData(){
  const k=mk(curY,curM);
  allData[k]=JSON.parse(JSON.stringify(mData));
  await setDoc(doc(db,'months',k),mData);
}

// ── RENDER ALL ──
function renderAll(){
  document.getElementById('month-label').textContent=`${curY}년 ${curM}월`;
  document.getElementById('right-title').textContent=`${curY}년 ${curM}월 경제정리`;
  document.getElementById('memo-text').value=mData.memo||'';
  renderGoal();renderIncDisp();renderExtraInc();renderLoans();renderSavings();
  renderItemsContainer();renderSummary();updateCustOpts();
}

// ── GOAL ──
function renderGoal(){
  const g=mData.goal||'';
  const st=document.getElementById('goal-static');
  const inp=document.getElementById('goal-inp');
  if(g){st.textContent=g;st.classList.remove('empty');}
  else{st.textContent='이달의 한마디';st.classList.add('empty');}
  st.style.display='block';inp.style.display='none';
}
window.startGoalEdit=function(){
  const st=document.getElementById('goal-static');
  const inp=document.getElementById('goal-inp');
  inp.value=mData.goal||'';
  st.style.display='none';inp.style.display='block';
  inp.focus();
  // 커서를 텍스트 끝으로
  const len=inp.value.length;
  inp.setSelectionRange(len,len);
};
window.commitGoal=function(){
  mData.goal=document.getElementById('goal-inp').value;
  renderGoal();
};

// ── INCOME ──
function renderIncDisp(){
  const sg=mData.income?.sanggyeom||0,hj=mData.income?.hyojeong||0;
  document.getElementById('disp-sg').textContent=sg?'₩ '+fmt(sg):'미입력';
  document.getElementById('disp-hj').textContent=hj?'₩ '+fmt(hj):'미입력';
}
window.startEditInc=function(who){
  const k=who==='sg'?'sanggyeom':'hyojeong';
  document.getElementById('disp-'+who).style.display='none';
  const inp=document.getElementById('edit-'+who);
  inp.style.display='block';
  inp.value=mData.income?.[k]?fmt(mData.income[k]):'';
  inp.focus();inp.select();
};
window.commitInc=function(who){
  const k=who==='sg'?'sanggyeom':'hyojeong';
  const inp=document.getElementById('edit-'+who);
  if(!mData.income) mData.income={sanggyeom:0,hyojeong:0};
  mData.income[k]=Number((inp.value||'').replace(/[^\d]/g,''))||0;
  inp.style.display='none';
  document.getElementById('disp-'+who).style.display='block';
  renderIncDisp();renderSummary();
};

// ── EXTRA INCOME ──
function renderExtraInc(){
  const rows=document.getElementById('extra-inc-rows');rows.innerHTML='';
  (mData.extraInc||[]).forEach((ei,i)=>{
    const r=document.createElement('div');r.className='extra-inc-row';
    r.innerHTML=`
      <input class="ei-name" type="text" placeholder="항목명 (예: 성과급)"
        value="${ei.name||''}" onblur="updateExtraInc(${i},'name',this.value)"/>
      <input class="ei-amt" type="text" placeholder="₩ 0"
        value="${ei.amount?'₩ '+fmt(ei.amount):''}"
        oninput="onAmtInput(this)" onblur="updateExtraInc(${i},'amount',this.value)"/>
      <button class="ei-del" onclick="delExtraInc(${i})">×</button>`;
    rows.appendChild(r);
  });
}
window.addExtraInc=function(){
  if(!mData.extraInc) mData.extraInc=[];
  mData.extraInc.push({name:'',amount:0});
  renderExtraInc();renderSummary();
};
window.updateExtraInc=function(i,field,val){
  if(!mData.extraInc[i]) return;
  if(field==='amount') val=Number((val||'').replace(/[^\d]/g,''))||0;
  mData.extraInc[i][field]=val;
  if(field==='amount') renderSummary();
};
window.delExtraInc=function(i){
  mData.extraInc.splice(i,1);renderExtraInc();renderSummary();
};

// ── LOANS ──
function renderLoans(){
  const container=document.getElementById('loan-rows');container.innerHTML='';
  (mData.loans||[]).forEach((loan,i)=>{
    const r=document.createElement('div');r.className='loan-row';
    r.innerHTML=`
      <div class="loan-row-top">
        <input class="loan-bank" type="text" placeholder="금융사명"
          value="${loan.bank||''}" onblur="updateLoan(${i},'bank',this.value)"/>
        <input class="loan-amt" type="text" placeholder="₩ 0"
          value="${loan.amount?'₩ '+fmt(loan.amount):''}"
          oninput="onAmtInput(this)" onblur="updateLoan(${i},'amount',this.value)"/>
        <button class="loan-del" onclick="deleteLoan(${i})">×</button>
      </div>
      <div class="loan-row-detail">
        <input class="loan-detail-inp" type="text" placeholder="대출명 (예: 잔금대출)"
          value="${loan.name||''}" onblur="updateLoan(${i},'name',this.value)"/>
        <input class="loan-detail-inp" type="text" placeholder="대출기간 (예: 30년)"
          value="${loan.period||''}" onblur="updateLoan(${i},'period',this.value)"/>
        <input class="loan-detail-inp" type="text" placeholder="목적 (예: 주택구입)"
          value="${loan.purpose||''}" onblur="updateLoan(${i},'purpose',this.value)"/>
        <input class="loan-detail-inp" type="text" placeholder="비고"
          value="${loan.note||''}" onblur="updateLoan(${i},'note',this.value)"/>
      </div>`;
    container.appendChild(r);
  });
  const total=(mData.loans||[]).reduce((s,l)=>s+(Number(l.amount)||0),0);
  const tot=document.getElementById('loan-total');
  if((mData.loans||[]).length>0){
    tot.style.display='block';
    tot.innerHTML=`총 대출 잔액: <strong>₩ ${fmt(total)}</strong>`;
  } else { tot.style.display='none'; }
}
window.addLoan=function(){
  if(!mData.loans) mData.loans=[];
  mData.loans.push({name:'',bank:'',amount:0,period:'',purpose:'',note:''});
  renderLoans();
};
window.updateLoan=function(i,field,val){
  if(!mData.loans[i]) return;
  if(field==='amount') val=Number((val||'').replace(/[^\d]/g,''))||0;
  mData.loans[i][field]=val;
  if(field==='amount') renderLoans();
};
window.deleteLoan=function(i){mData.loans.splice(i,1);renderLoans();};

// ── SAVINGS ──
function renderSavings(){
  const sb=mData.savings?.safebox||0;const cma=mData.savings?.cma||0;
  document.getElementById('sb-safebox').value=sb?'₩ '+fmt(sb):'';
  document.getElementById('sb-cma').value=cma?'₩ '+fmt(cma):'';
  // 왼쪽 패널용은 제거 (오른쪽만)
}
window.commitSavingsRight=function(){
  if(!mData.savings) mData.savings={safebox:0,cma:0};

function renderItemsContainer(){
  const c=document.getElementById('items-container');c.innerHTML='';
  const prevK=mkPrev();const prevData=allData[prevK];
  const groups={};CATS.forEach(cat=>groups[cat]=[]);
  itemDefs.forEach(def=>{
    const saved=(mData.items||[]).find(i=>i.name===def.name);
    const prevItem=(prevData?.items||[]).find(i=>i.name===def.name);
    groups[def.cat].push({def,saved,prevItem});
  });
  CATS.forEach(cat=>{
    const list=groups[cat];if(!list||!list.length) return;
    const noAcc=NO_ACCOUNT_CATS.includes(cat);
    const cls=noAcc?'no-acc':'with-acc';
    const g=document.createElement('div');g.className='item-group';
    const colHdrCols=noAcc
      ?`<span>항목</span><span class="r">지난달</span><span class="r">금액 (원)</span><span>메모</span><span class="c">삭제</span>`
      :`<span>항목</span><span class="r">지난달</span><span class="r">금액 (원)</span><span>보낼 계좌</span><span>메모</span><span class="c">삭제</span>`;
    g.innerHTML=`
      <div class="group-hdr">
        <span class="cat-dot dot-${cat.replace('/','\\/')}"></span>
        <span class="gh-title">${cat}</span>
      </div>
      <div class="col-hdr ${cls}">${colHdrCols}</div>`;
    const rows=document.createElement('div');
    list.forEach(({def,saved,prevItem})=>rows.appendChild(makeItemRow(def,saved,prevItem,cat,noAcc)));
    g.appendChild(rows);
    // 추가 행
    const ck=cat.replace(/[\s\/]/g,'_');
    const ar=document.createElement('div');ar.className='add-row-wrap';
    const addRowContent=noAcc
      ?`<input type="text" placeholder="새 항목명" id="qa-n-${ck}"/>
         <div></div>
         <input type="text" placeholder="₩ 0" id="qa-a-${ck}" oninput="onAmtInput(this)"/>
         <input type="text" placeholder="메모" id="qa-m-${ck}"/>
         <div style="display:flex;justify-content:center"><button class="add-btn" onclick="quickAdd('${cat}','${ck}')">+</button></div>`
      :`<input type="text" placeholder="새 항목명" id="qa-n-${ck}"/>
        <div></div>
        <input type="text" placeholder="₩ 0" id="qa-a-${ck}" oninput="onAmtInput(this)"/>
        <select id="qa-acc-${ck}">
          <option value="">계좌 선택</option>
          ${ACCOUNTS.map(a=>`<option value="${a}">${a}</option>`).join('')}
        </select>
        <input type="text" placeholder="메모" id="qa-m-${ck}"/>
        <div style="display:flex;justify-content:center"><button class="add-btn" onclick="quickAdd('${cat}','${ck}')">+</button></div>`;
    ar.innerHTML=`<div class="add-row ${cls}">${addRowContent}</div>`;
    g.appendChild(ar);
    c.appendChild(g);
  });
}

function makeItemRow(def,saved,prevItem,cat,noAcc){
  const cls=noAcc?'no-acc':'with-acc';
  const r=document.createElement('div');
  r.className=`item-row ${cls}`;r.dataset.name=def.name;
  const accOpts=ACCOUNTS.map(a=>`<option value="${a}"${saved?.account===a?' selected':''}>${a}</option>`).join('');
  const prevVal=prevItem?.amount?'₩ '+fmt(prevItem.amount):'-';
  const rowContent=noAcc
    ?`<div class="ir-name" data-defname="${def.name}">${def.name}</div>
      <div class="ir-prev">${prevVal}</div>
      <input class="ir-amount" type="text" placeholder="₩ 0"
        value="${saved?.amount?'₩ '+fmt(saved.amount):''}"
        data-field="amount" data-name="${def.name}"
        oninput="onAmtInput(this)" onblur="onAmtBlur(this)"/>
      <input class="ir-memo" type="text" placeholder="메모"
        value="${saved?.memo||''}"
        data-field="memo" data-name="${def.name}"
        onblur="onFieldChange(this)"/>
      <div style="display:flex;justify-content:center">
        <button class="ir-del" onclick="deleteItemDef('${def.name}')">×</button>
      </div>`
    :`<div class="ir-name" data-defname="${def.name}">${def.name}</div>
      <div class="ir-prev">${prevVal}</div>
      <input class="ir-amount" type="text" placeholder="₩ 0"
        value="${saved?.amount?'₩ '+fmt(saved.amount):''}"
        data-field="amount" data-name="${def.name}"
        oninput="onAmtInput(this)" onblur="onAmtBlur(this)"/>
      <select class="ir-account" data-field="account" data-name="${def.name}" onchange="onFieldChange(this)">
        <option value="">계좌 선택</option>${accOpts}
      </select>
      <input class="ir-memo" type="text" placeholder="메모"
        value="${saved?.memo||''}"
        data-field="memo" data-name="${def.name}"
        onblur="onFieldChange(this)"/>
      <div style="display:flex;justify-content:center">
        <button class="ir-del" onclick="deleteItemDef('${def.name}')">×</button>
      </div>`;
  r.innerHTML=rowContent;
  return r;
}

// ── 항목 삭제 (얼럿 없음) ──
window.deleteItemDef=async function(name){
  itemDefs=itemDefs.filter(d=>d.name!==name);
  if(mData.items) mData.items=mData.items.filter(i=>i.name!==name);
  await saveItemDefs();
  renderItemsContainer();renderSummary();updateCustOpts();
};

// ── 빠른 추가 ──
window.quickAdd=async function(cat,ck){
  const nameEl=document.getElementById(`qa-n-${ck}`);
  const amtEl=document.getElementById(`qa-a-${ck}`);
  const accEl=document.getElementById(`qa-acc-${ck}`);
  const memoEl=document.getElementById(`qa-m-${ck}`);
  const name=nameEl?.value.trim();
  if(!name){nameEl?.focus();return;}
  const amount=Number((amtEl?.value||'').replace(/[^\d]/g,''))||0;
  const account=accEl?.value||'';const memo=memoEl?.value||'';
  if(!itemDefs.find(d=>d.name===name)) itemDefs.push({name,cat});
  await saveItemDefs();
  if(!mData.items) mData.items=[];
  let item=mData.items.find(i=>i.name===name);
  if(!item){item={name,cat,amount:0,account:'',memo:''};mData.items.push(item);}
  item.amount=amount;item.account=account;item.memo=memo;
  renderItemsContainer();renderSummary();updateCustOpts();
  showToast(`"${name}" 추가됐어요 ✓`);
};

// ── SUMMARY ──
function renderSummary(){
  const sg=mData.income?.sanggyeom||0,hj=mData.income?.hyojeong||0;
  const extra=(mData.extraInc||[]).reduce((s,e)=>s+(Number(e.amount)||0),0);
  const total=sg+hj+extra;
  const exp=(mData.items||[]).reduce((s,i)=>s+(Number(i.amount)||0),0);
  const bal=total-exp;const ratio=total?Math.round(exp/total*100):0;
  document.getElementById('hub-income').textContent='₩ '+fmt(total);
  document.getElementById('hub-balance').textContent='₩ '+fmt(bal);
  document.getElementById('hub-sub').textContent=bal===0?'딱 맞아요 ✓':bal>0?'남아요':'초과!';
  const rf=document.getElementById('ratio-fill');
  rf.style.width=Math.min(ratio,100)+'%';
  rf.style.background=ratio>90?'#b83228':ratio>70?'#e67e22':'var(--accent)';
  document.getElementById('ratio-pct').textContent=ratio+'%';
  document.getElementById('ratio-pct').style.color=ratio>90?'var(--red)':ratio>70?'var(--yellow)':'var(--accent)';
  document.getElementById('total-exp').textContent='₩ '+fmt(exp);
  const catT={};(mData.items||[]).forEach(i=>{catT[i.cat]=(catT[i.cat]||0)+(Number(i.amount)||0);});
  const maxC=Math.max(...Object.values(catT),1);
  document.getElementById('cat-bars').innerHTML=Object.entries(catT).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`
    <div class="cbr">
      <div class="cbr-label"><span class="cat-dot dot-${cat.replace('/','\\/')}"></span>${cat}</div>
      <div class="cbr-track"><div class="cbr-fill bar-${cat.replace('/','\\/')}" style="width:${Math.round(val/maxC*100)}%"></div></div>
      <div class="cbr-val">${fmtS(val)}</div>
    </div>`).join('');
  renderCustChart();
}

// ── FIELD HANDLERS ──
window.onAmtInput=function(el){
  const raw=el.value.replace(/[^\d]/g,'');
  el.value=raw?'₩ '+Number(raw).toLocaleString('ko-KR'):'';
};
window.onAmtBlur=function(el){updateItem(el);renderSummary();};
window.onFieldChange=function(el){updateItem(el);};
function updateItem(el){
  const name=el.dataset.name,field=el.dataset.field;
  let val=el.value;
  if(field==='amount') val=Number(val.replace(/[^\d]/g,''))||0;
  if(!mData.items) mData.items=[];
  let item=mData.items.find(i=>i.name===name);
  const def=itemDefs.find(d=>d.name===name);
  if(!item){item={name,cat:def?.cat||'기타',amount:0,account:'',memo:''};mData.items.push(item);}
  item[field]=val;
}

window.changeMonth=async function(dir){
  collectInputs();
  curM+=dir;if(curM>12){curM=1;curY++;}if(curM<1){curM=12;curY--;}
  loadMonthData();
  renderAll();
};
function collectInputs(){
  document.querySelectorAll('.item-row[data-name]').forEach(row=>{
    const name=row.dataset.name;
    const amtEl=row.querySelector('[data-field="amount"]');
    const accEl=row.querySelector('[data-field="account"]');
    const memoEl=row.querySelector('[data-field="memo"]');
    if(!amtEl) return;
    const amount=Number((amtEl.value||'').replace(/[^\d]/g,''))||0;
    const account=accEl?.value||'';const memo=memoEl?.value||'';
    if(amount||account||memo){
      if(!mData.items) mData.items=[];
      let item=mData.items.find(i=>i.name===name);
      const def=itemDefs.find(d=>d.name===name);
      if(!item){item={name,cat:def?.cat||'기타',amount:0,account:'',memo:''};mData.items.push(item);}
      item.amount=amount;item.account=account;item.memo=memo;
    }
  });
  document.querySelectorAll('.loan-row').forEach((row,i)=>{
    if(!mData.loans[i]) return;
    const b=row.querySelector('.loan-bank');const a=row.querySelector('.loan-amt');
    if(b) mData.loans[i].bank=b.value;
    if(a) mData.loans[i].amount=Number((a.value||'').replace(/[^\d]/g,''))||0;
  });
  mData.memo=document.getElementById('memo-text').value;
  mData.goal=document.getElementById('goal-inp').style.display!=='none'
    ? document.getElementById('goal-inp').value
    : mData.goal;
  commitSavingsRight();
}

window.updateCustOpts=function(){
  const type=document.getElementById('cust-type').value;
  const sel=document.getElementById('cust-target');const prev=sel.value;
  if(type==='cat') sel.innerHTML=CATS.map(c=>`<option value="${c}">${c}</option>`).join('');
  else sel.innerHTML=[...new Set(itemDefs.map(d=>d.name))].map(n=>`<option value="${n}">${n}</option>`).join('');
  if(prev) sel.value=prev;
  renderCustChart();
};
window.renderCustChart=function(){
  const type=document.getElementById('cust-type').value;
  const target=document.getElementById('cust-target').value;
  if(!target) return;
  const keys=Object.keys(allData).sort();
  let labels=[],data=[];
  if(custP==='monthly'){
    keys.forEach(k=>{
      const d=allData[k],[y,m]=k.split('-');
      labels.push(`${y}.${m}`);
      data.push(type==='cat'
        ?(d.items||[]).filter(i=>i.cat===target).reduce((s,i)=>s+(Number(i.amount)||0),0)
        :((d.items||[]).find(i=>i.name===target)?.amount||0));
    });
  } else {
    const qm={};
    keys.forEach(k=>{const d=allData[k];const[y,m]=k.split('-').map(Number);const q=`${y} Q${Math.ceil(m/3)}`;
      if(!qm[q])qm[q]=0;
      qm[q]+=type==='cat'?(d.items||[]).filter(i=>i.cat===target).reduce((s,i)=>s+(Number(i.amount)||0),0):((d.items||[]).find(i=>i.name===target)?.amount||0);
    });
    Object.entries(qm).forEach(([q,v])=>{labels.push(q);data.push(v);});
  }
  if(charts.cust) charts.cust.destroy();
  const color=type==='cat'?(CAT_COLORS[target]||'#3498db'):'#3498db';
  charts.cust=new Chart(document.getElementById('cust-chart').getContext('2d'),{
    type:'line',data:{labels,datasets:[{label:target,data,borderColor:color,backgroundColor:color+'22',tension:.4,fill:true,pointBackgroundColor:color,pointRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9e9a90',font:{size:11},boxWidth:8}}},
      scales:{x:{ticks:{color:'#9e9a90',font:{size:11}},grid:{display:false}},
              y:{ticks:{color:'#9e9a90',font:{size:11},callback:v=>fmtS(v)},grid:{color:'#ede9e2'}}}}
  });
};

function getAgg(period){
  const keys=Object.keys(allData).sort();
  if(period==='monthly'){
    return keys.map(k=>{
      const d=allData[k],[y,m]=k.split('-');
      const i=(d.income?.sanggyeom||0)+(d.income?.hyojeong||0)+(d.extraInc||[]).reduce((s,e)=>s+(Number(e.amount)||0),0);
      const e=(d.items||[]).reduce((s,x)=>s+(Number(x.amount)||0),0);
      return{label:`${y}.${m}`,inc:i,exp:e,bal:i-e,items:d.items||[]};
    });
  } else if(period==='quarterly'){
    const qm={};
    keys.forEach(k=>{const d=allData[k];const[y,m]=k.split('-').map(Number);const q=`${y} Q${Math.ceil(m/3)}`;
      if(!qm[q])qm[q]={label:q,inc:0,exp:0,bal:0,items:[]};
      qm[q].inc+=(d.income?.sanggyeom||0)+(d.income?.hyojeong||0)+(d.extraInc||[]).reduce((s,e)=>s+(Number(e.amount)||0),0);
      qm[q].exp+=(d.items||[]).reduce((s,x)=>s+(Number(x.amount)||0),0);
      qm[q].items=[...qm[q].items,...(d.items||[])];
    });
    return Object.values(qm).map(v=>({...v,bal:v.inc-v.exp}));
  } else {
    const ym={};
    keys.forEach(k=>{const d=allData[k];const y=k.split('-')[0];
      if(!ym[y])ym[y]={label:y+'년',inc:0,exp:0,bal:0,items:[]};
      ym[y].inc+=(d.income?.sanggyeom||0)+(d.income?.hyojeong||0)+(d.extraInc||[]).reduce((s,e)=>s+(Number(e.amount)||0),0);
      ym[y].exp+=(d.items||[]).reduce((s,x)=>s+(Number(x.amount)||0),0);
      ym[y].items=[...ym[y].items,...(d.items||[])];
    });
    return Object.values(ym).map(v=>({...v,bal:v.inc-v.exp}));
  }
}
function renderDashboard(){

  if(!agg.length){document.getElementById('dashboard').innerHTML='<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--text3);font-size:15px">아직 데이터가 없어요</div>';return;}

  const allItems=Object.values(allData).flatMap(d=>d.items||[]);

  const avgInc=Math.round(agg.reduce((s,a)=>s+a.inc,0)/agg.length);
  const totalSaved=agg.reduce((s,a)=>s+Math.max(a.bal,0),0);

  const topItems=Object.values(itemAgg).sort((a,b)=>b.total-a.total).slice(0,6);
  const latCat={};(latest.items||[]).forEach(i=>{latCat[i.cat]=(latCat[i.cat]||0)+(Number(i.amount)||0);});

  const labels=agg.map(a=>a.label);
  const scOpts={x:{ticks:{color:'#9e9a90',font:{size:11}},grid:{display:false}},y:{ticks:{color:'#9e9a90',font:{size:11},callback:v=>fmtS(v)},grid:{color:'#ede9e2'}}};
  const legOpts={labels:{color:'#5e5a52',font:{size:11},boxWidth:10}};
  document.getElementById('dashboard').innerHTML=`
    <div class="stat-card sc-green"><div class="sc-lbl">평균 월 수입</div><div class="sc-val">₩ ${fmtS(avgInc)}</div><div class="sc-sub">${agg.length}개월 평균</div></div>
    <div class="stat-card sc-red"><div class="sc-lbl">평균 월 지출</div><div class="sc-val">₩ ${fmtS(avgExp)}</div><div class="sc-sub">${agg.length}개월 평균</div></div>
    <div class="stat-card sc-yellow"><div class="sc-lbl">누적 잔액 합계</div><div class="sc-val">₩ ${fmtS(totalSaved)}</div><div class="sc-sub">전체 기간</div></div>

    </div>`;
  new Chart(document.getElementById('ch-ie').getContext('2d'),{type:'bar',data:{labels,datasets:[
    {label:'수입',data:agg.map(a=>a.inc),backgroundColor:'rgba(42,82,37,.15)',borderColor:'#2a5225',borderWidth:2,borderRadius:4},
    {label:'지출',data:agg.map(a=>a.exp),backgroundColor:'rgba(184,50,40,.15)',borderColor:'#b83228',borderWidth:2,borderRadius:4},

  new Chart(document.getElementById('ch-bal').getContext('2d'),{type:'line',data:{labels,datasets:[{label:'HUB 잔액',data:agg.map(a=>a.bal),borderColor:'#2a5225',backgroundColor:'rgba(42,82,37,.08)',tension:.4,fill:true,pointBackgroundColor:'#2a5225',pointRadius:4}]},options:{responsive:true,plugins:{legend:legOpts},scales:scOpts}});

    document.getElementById('pie-leg').innerHTML=pieLabels.map((l,i)=>`<div class="cat-leg-item"><span class="leg-dot" style="background:${pieColors[i]}"></span>${l}: ₩ ${fmtS(pieData[i])}</div>`).join('');
  }
  new Chart(document.getElementById('ch-ratio').getContext('2d'),{type:'line',data:{labels,datasets:[{label:'지출 비율',data:agg.map(a=>a.inc?Math.round(a.exp/a.inc*100):0),borderColor:'#e67e22',backgroundColor:'rgba(230,126,34,.08)',tension:.4,fill:true,pointBackgroundColor:'#e67e22',pointRadius:4}]},options:{responsive:true,plugins:{legend:legOpts},scales:{x:{ticks:{color:'#9e9a90',font:{size:11}},grid:{display:false}},y:{ticks:{color:'#9e9a90',font:{size:11},callback:v=>v+'%'},grid:{color:'#ede9e2'},max:120}}}});
}

function fmt(n){return Number(n||0).toLocaleString('ko-KR');}
function fmtS(n){n=Number(n||0);if(n>=100000000)return(n/100000000).toFixed(1)+'억';if(n>=10000)return Math.round(n/10000)+'만';return n.toLocaleString('ko-KR');}
window.showToast=function(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);};
</script>
</body>
</html>
